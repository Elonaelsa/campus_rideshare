<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Campus Rideshare{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background: linear-gradient(to right, #e3f2fd, #f1f8e9);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
    }
    .navbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .navbar-brand span {
      font-weight: bold;
    }
    .btn-gradient {
      color: #fff !important;
      background: linear-gradient(90deg, #2186eb 30%, #22c993 100%);
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-gradient:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(33,134,235,0.18);
      color: #fff !important;
    }
    footer.footer {
      background: #fff;
      border-top: 1px solid #ddd;
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
      color: #666;
      font-size: 0.9rem;
    }
    /* Sidebar */
    .sidebar .menu a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      font-weight: 500;
    }
    .sidebar .menu i {
      width: 20px;
      height: 20px;
    }
    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      padding: 20px;
      border-radius: 25px;
      box-shadow: 4px 0 12px rgba(0,0,0,0.08);
    }
    .heading-black {
      color: #111;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.05;
    }
    .gradient-text {
  background: linear-gradient(90deg, #2186eb 30%, #22c993 100%);
  background-clip: text;          /* Standard property */
  -webkit-background-clip: text;  /* Chrome/Safari */
  -webkit-text-fill-color: transparent;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.05;
}

    .sidebar .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1d4ed8;
      margin-bottom: 30px;
    }
    .sidebar .menu {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar .menu li {
      margin-bottom: 12px;
    }
    .sidebar .menu a {
      color: #374151;
      transition: 0.2s;
    }
    .sidebar .menu a:hover,
    .sidebar .menu a.active {
      background: #e0e7ff;
      color: #1d4ed8;
    }
  </style>
</head>
<body>

  <!-- Page Content -->
  <main class="container my-5">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    &copy; {{ current_year|default(2025) }} Campus Rideshare
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    lucide.createIcons();

    // Global Bootstrap form validation
    (function () {
      'use strict';
      const forms = document.querySelectorAll('form');
      Array.from(forms).forEach(function (form) {
        form.addEventListener('submit', function (event) {
          if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
          }
          form.classList.add('was-validated');
        }, false);
      });
    })();
  </script>
</body>
</html>
